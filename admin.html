<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel — Clube de Vantagens</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0B1F3A; --coral:#FF6B4A; --river:#178A8A; --cream:#FAF7F1;
  --ink:#13161B; --ink-soft:#5B6472; --line:#E7E1D6;
  --display:'Sora', sans-serif; --body:'Inter', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--body);background:var(--cream);color:var(--ink);min-height:100vh;}
.wrap{max-width:640px;margin:0 auto;padding:30px 20px 60px;}
h1{font-family:var(--display);font-weight:800;color:var(--navy);font-size:1.4rem;margin-bottom:4px;}
.sub{color:var(--ink-soft);font-size:0.85rem;margin-bottom:28px;}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:16px;}
label{font-size:0.8rem;font-weight:600;color:var(--ink-soft);display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
input{border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:0.95rem;font-family:var(--body);outline:none;}
input:focus{border-color:var(--river);}
.btn{font-family:var(--display);font-weight:700;font-size:0.85rem;padding:11px 18px;border-radius:999px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-dark{background:var(--navy);color:#fff;}
.btn-coral{background:var(--coral);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--line);color:var(--ink);}
.btn-danger{background:#fff;color:var(--coral);border:1.5px solid var(--coral);font-size:0.78rem;padding:7px 14px;}
.error{color:var(--coral);font-size:0.82rem;min-height:1em;margin-top:-4px;margin-bottom:8px;}
.partner-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;border-bottom:1px solid var(--line);padding:14px 0;}
.partner-row:last-child{border-bottom:none;}
.partner-row .info strong{display:block;font-family:var(--display);color:var(--navy);font-size:0.95rem;}
.partner-row .info span{font-size:0.78rem;color:var(--river);font-weight:600;text-transform:uppercase;}
.partner-row .info p{font-size:0.82rem;color:var(--ink-soft);margin-top:4px;}
.tag{display:inline-block;background:var(--coral);color:#fff;font-size:0.72rem;font-weight:700;padding:2px 8px;border-radius:999px;margin-top:4px;}
#loginView, #adminView{display:none;}
#loginView.active, #adminView.active{display:block;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.hint{font-size:0.78rem;color:var(--ink-soft);background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:20px;}
</style>
</head>
<body>
<div class="wrap">

  <div id="loginView" class="active">
    <h1>Painel do Clube</h1>
    <p class="sub">Entre com sua conta de administrador pra gerenciar os parceiros.</p>
    <div class="card">
      <form id="loginForm">
        <label>E-mail<input type="email" id="loginEmail" required></label>
        <label>Senha<input type="password" id="loginPassword" required></label>
        <p class="error" id="loginError"></p>
        <button class="btn btn-dark" type="submit">Entrar</button>
      </form>
    </div>
    <p class="hint">Esse login é só pra quem administra o clube (você ou o cliente dono da marca) — é diferente do cadastro de clientes finais no site.</p>
  </div>

  <div id="adminView">
    <div class="topbar">
      <div>
        <h1>Parceiros</h1>
        <p class="sub" id="welcomeMsg"></p>
      </div>
      <button class="btn btn-outline" id="logoutBtn">Sair</button>
    </div>

    <div class="card">
      <h3 style="font-family:var(--display);color:var(--navy);margin-bottom:14px;">Adicionar parceiro</h3>
      <form id="partnerForm">
        <label>Categoria<input type="text" id="pCat" placeholder="Ex: Saúde" required></label>
        <label>Nome do negócio<input type="text" id="pName" placeholder="Ex: Farmácia São Francisco" required></label>
        <label>Descrição da oferta<input type="text" id="pDesc" placeholder="Ex: Desconto em medicamentos" required></label>
        <label>Desconto (etiqueta)<input type="text" id="pTag" placeholder="Ex: -18%" required></label>
        <p class="error" id="partnerError"></p>
        <button class="btn btn-coral" type="submit">Adicionar parceiro</button>
      </form>
    </div>

    <div class="card">
      <h3 style="font-family:var(--display);color:var(--navy);margin-bottom:8px;">Parceiros cadastrados</h3>
      <div id="partnersList"></div>
    </div>
  </div>

</div>

<script>
  // ============================================================
  // Use os MESMOS valores de supabaseUrl/supabaseAnonKey do index.html
  // E coloque seu e-mail (ou o do cliente) na lista de admins abaixo
  // E TAMBÉM na política SQL do Supabase (veja o README).
  // ============================================================
  const CONFIG = {
   'supabaseUrl: "https://xmwokmzhjabqulclnuiz.supabase.co",
    supabaseAnonKey: "COLE_AQUI_A_CHAVE_PUBLISHABLE_COMPLETA",
    adminEmails: ["ricardocontreras19988@gmail.com"]
  const ready = CONFIG.supabaseUrl.startsWith('http') && CONFIG.supabaseAnonKey.length > 20;
  if (!ready){
    document.body.innerHTML = '<div class="wrap"><h1>Painel não configurado</h1><p class="sub">Preencha CONFIG.supabaseUrl e CONFIG.supabaseAnonKey neste arquivo (admin.html), igual já fez no index.html.</p></div>';
  } else {
    const supabase = window.supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey);

    const loginView = document.getElementById('loginView');
    const adminView = document.getElementById('adminView');
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const partnerForm = document.getElementById('partnerForm');
    const partnerError = document.getElementById('partnerError');
    const partnersList = document.getElementById('partnersList');
    const logoutBtn = document.getElementById('logoutBtn');
    const welcomeMsg = document.getElementById('welcomeMsg');

    function showLogin(){ loginView.classList.add('active'); adminView.classList.remove('active'); }
    function showAdmin(email){
      loginView.classList.remove('active'); adminView.classList.add('active');
      welcomeMsg.textContent = `Logado como ${email}`;
      loadPartners();
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.textContent = '';
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error){ loginError.textContent = 'E-mail ou senha incorretos.'; return; }
      if (!CONFIG.adminEmails.includes(data.user.email)){
        loginError.textContent = 'Esta conta não tem acesso ao painel de administração.';
        await supabase.auth.signOut();
        return;
      }
      showAdmin(data.user.email);
    });

    logoutBtn.addEventListener('click', async () => {
      await supabase.auth.signOut();
      showLogin();
    });

    partnerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      partnerError.textContent = '';
      const cat = document.getElementById('pCat').value;
      const name = document.getElementById('pName').value;
      const description = document.getElementById('pDesc').value;
      const tag = document.getElementById('pTag').value;
      const { error } = await supabase.from('partners').insert({ cat, name, description, tag });
      if (error){ partnerError.textContent = 'Erro ao salvar: ' + error.message; return; }
      partnerForm.reset();
      loadPartners();
    });

    async function loadPartners(){
      const { data, error } = await supabase.from('partners').select('*').order('created_at', { ascending: true });
      if (error || !data){ partnersList.innerHTML = '<p class="sub">Nenhum parceiro cadastrado ainda.</p>'; return; }
      if (data.length === 0){ partnersList.innerHTML = '<p class="sub">Nenhum parceiro cadastrado ainda. O site vai mostrar exemplos até você adicionar o primeiro real.</p>'; return; }
      partnersList.innerHTML = data.map(p => `
        <div class="partner-row">
          <div class="info">
            <span>${p.cat}</span>
            <strong>${p.name}</strong>
            <p>${p.description}</p>
            <span class="tag">${p.tag}</span>
          </div>
          <button class="btn-danger" data-id="${p.id}">Remover</button>
        </div>
      `).join('');
      partnersList.querySelectorAll('button[data-id]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Remover este parceiro?')) return;
          await supabase.from('partners').delete().eq('id', btn.dataset.id);
          loadPartners();
        });
      });
    }

    // mantém logado se já tinha sessão
    supabase.auth.getSession().then(({ data }) => {
      if (data.session && CONFIG.adminEmails.includes(data.session.user.email)){
        showAdmin(data.session.user.email);
      }
    });
  }
</script>
</body>
</html>
