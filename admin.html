<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel — Clube de Vantagens</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0B1F3A;--coral:#FF6B4A;--river:#178A8A;--cream:#FAF7F1;--ink:#13161B;--soft:#5B6472;--line:#E7E1D6;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
.wrap{max-width:640px;margin:0 auto;padding:30px 20px 60px;}
h1{font-family:'Sora',sans-serif;font-weight:800;color:var(--navy);font-size:1.4rem;margin-bottom:4px;}
.sub{color:var(--soft);font-size:.85rem;margin-bottom:28px;}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:16px;}
label{font-size:.8rem;font-weight:600;color:var(--soft);display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
input,select{border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:.95rem;font-family:'Inter',sans-serif;outline:none;width:100%;}
input:focus,select:focus{border-color:var(--river);}
.btn{font-family:'Sora',sans-serif;font-weight:700;font-size:.85rem;padding:11px 18px;border-radius:999px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-dark{background:var(--navy);color:#fff;}
.btn-coral{background:var(--coral);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--line);color:var(--ink);}
.btn-danger{background:#fff;color:var(--coral);border:1.5px solid var(--coral);font-size:.78rem;padding:7px 14px;border-radius:999px;cursor:pointer;font-family:'Sora',sans-serif;font-weight:700;}
.error{color:var(--coral);font-size:.82rem;margin-top:-4px;margin-bottom:8px;min-height:1em;}
.partner-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;border-bottom:1px solid var(--line);padding:14px 0;}
.partner-row:last-child{border-bottom:none;}
.partner-row .info strong{display:block;font-family:'Sora',sans-serif;color:var(--navy);font-size:.95rem;}
.partner-row .info span{font-size:.78rem;color:var(--river);font-weight:600;text-transform:uppercase;}
.partner-row .info p{font-size:.82rem;color:var(--soft);margin-top:4px;}
.tag{display:inline-block;background:var(--coral);color:#fff;font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:999px;margin-top:4px;}
#loginView,#adminView{display:none;}
#loginView.active,#adminView.active{display:block;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.logo{font-family:'Sora',sans-serif;font-weight:800;color:var(--navy);font-size:1rem;display:flex;align-items:center;gap:8px;}
.logo .dot{width:8px;height:8px;border-radius:50%;background:var(--coral);}
.hint{font-size:.78rem;color:var(--soft);background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:20px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:500px){.form-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">

  <div id="loginView" class="active">
    <div style="text-align:center;margin-bottom:28px;">
      <div class="logo" style="justify-content:center;margin-bottom:8px;"><span class="dot"></span>DCC Painel Admin</div>
      <p class="sub" style="margin:0;">Entre com sua conta de administrador</p>
    </div>
    <div class="card">
      <form id="loginForm">
        <label>E-mail<input type="email" id="loginEmail" required placeholder="seu@email.com"></label>
        <label>Senha<input type="password" id="loginPassword" required placeholder="••••••"></label>
        <p class="error" id="loginError"></p>
        <button class="btn btn-dark" type="submit" style="width:100%;justify-content:center;">Entrar no painel</button>
      </form>
    </div>
    <p class="hint">Este painel é exclusivo para administradores do clube. Os parceiros cadastrados aqui aparecem automaticamente no site.</p>
  </div>

  <div id="adminView">
    <div class="topbar">
      <div>
        <h1>Painel do Clube</h1>
        <p class="sub" id="welcomeMsg"></p>
      </div>
      <button class="btn btn-outline" id="logoutBtn">Sair</button>
    </div>

    <div class="card">
      <h3 style="font-family:'Sora',sans-serif;color:var(--navy);margin-bottom:16px;font-size:1rem;">➕ Adicionar parceiro</h3>
      <form id="partnerForm">
        <div class="form-row">
          <label>Categoria
            <select id="pCat">
              <option>Alimentação</option>
              <option>Saúde</option>
              <option>Autocuidado</option>
              <option>Cuidados Pet</option>
              <option>Serviços</option>
              <option>Lazer</option>
              <option>Educação</option>
              <option>Moda</option>
              <option>Outros</option>
            </select>
          </label>
          <label>Desconto (ex: -15%)<input type="text" id="pTag" placeholder="-15%" required></label>
        </div>
        <label>Nome do negócio<input type="text" id="pName" placeholder="Ex: Farmácia São João" required></label>
        <label>Descrição da oferta<input type="text" id="pDesc" placeholder="Ex: Desconto em medicamentos e perfumaria" required></label>
        <p class="error" id="partnerError"></p>
        <button class="btn btn-coral" type="submit">Salvar parceiro</button>
      </form>
    </div>

    <div class="card">
      <h3 style="font-family:'Sora',sans-serif;color:var(--navy);margin-bottom:12px;font-size:1rem;">📋 Parceiros cadastrados</h3>
      <div id="partnersList"><p class="sub">Carregando...</p></div>
    </div>
  </div>

</div>
<script>
const CONFIG = {
  supabaseUrl: "https://xmwokmzhjabqulclnuiz.supabase.co",
  supabaseAnonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhtd29rbXpoamFicXVsY2xudWl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNjYxNzUsImV4cCI6MjA5Nzg0MjE3NX0.vNPzxMry71J1NLF5FxUVBS_zDzZncDktOq1oOqbd7BQ",
  adminEmail: "ricardodcc875@gmail.com"
};

const supabase = window.supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey);
const loginView = document.getElementById('loginView');
const adminView = document.getElementById('adminView');

function showLogin(){ loginView.classList.add('active'); adminView.classList.remove('active'); }
function showAdmin(email){ loginView.classList.remove('active'); adminView.classList.add('active'); document.getElementById('welcomeMsg').textContent = 'Logado como '+email; loadPartners(); }

document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  document.getElementById('loginError').textContent = '';
  const {data, error} = await supabase.auth.signInWithPassword({email, password});
  if(error){ document.getElementById('loginError').textContent = 'E-mail ou senha incorretos.'; return; }
  if(data.user.email !== CONFIG.adminEmail){ document.getElementById('loginError').textContent = 'Esta conta não tem acesso ao painel.'; await supabase.auth.signOut(); return; }
  showAdmin(data.user.email);
});

document.getElementById('logoutBtn').addEventListener('click', async () => { await supabase.auth.signOut(); showLogin(); });

document.getElementById('partnerForm').addEventListener('submit', async e => {
  e.preventDefault();
  document.getElementById('partnerError').textContent = '';
  const {error} = await supabase.from('partners').insert({
    cat: document.getElementById('pCat').value,
    name: document.getElementById('pName').value,
    description: document.getElementById('pDesc').value,
    tag: document.getElementById('pTag').value
  });
  if(error){ document.getElementById('partnerError').textContent = 'Erro: '+error.message; return; }
  document.getElementById('partnerForm').reset();
  loadPartners();
});

async function loadPartners(){
  const {data, error} = await supabase.from('partners').select('*').order('created_at', {ascending:false});
  const el = document.getElementById('partnersList');
  if(error || !data || data.length === 0){ el.innerHTML = '<p class="sub">Nenhum parceiro cadastrado ainda.</p>'; return; }
  el.innerHTML = data.map(p => '<div class="partner-row"><div class="info"><span>'+p.cat+'</span><strong>'+p.name+'</strong><p>'+p.description+'</p><span class="tag">'+p.tag+'</span></div><button class="btn-danger" data-id="'+p.id+'">Remover</button></div>').join('');
  el.querySelectorAll('button[data-id]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if(!confirm('Remover '+btn.closest('.partner-row').querySelector('strong').textContent+'?')) return;
      await supabase.from('partners').delete().eq('id', btn.dataset.id);
      loadPartners();
    });
  });
}

supabase.auth.getSession().then(({data}) => {
  if(data.session && data.session.user.email === CONFIG.adminEmail){ showAdmin(data.session.user.email); }
});
</script>
</body>
</html>
